name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[elevenlabs]" build twine "hatchling<1.27"

      - name: Run smoke test
        run: |
          python -m voice_rag.cli --help
          TMP_DIR="$(mktemp -d)"
          python -m voice_rag.cli init --dir "$TMP_DIR"
          test -f "$TMP_DIR/voice-rag.yaml"
          python -m voice_rag.cli doctor --config "$TMP_DIR/voice-rag.yaml"

      - name: Build artifacts
        run: python -m build --no-isolation

      - name: Check artifacts
        run: python -m twine check dist/*

  build:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine "hatchling<1.27"

      - name: Build
        run: python -m build --no-isolation

      - name: Check artifacts
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*
